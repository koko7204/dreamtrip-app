<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>DreamTrip Demo</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
      background: linear-gradient(135deg,#0f2027,#2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: auto;
    }

    .app {
      background: #ffffff;
      width: 360px;
      max-width: 90vw;
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      overflow: hidden;
    }

    h2 {
      margin: 5px 0 15px;
      font-weight: 600;
    }

    .progress {
      height: 6px;
      background: #eee;
      border-radius: 10px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg,#4facfe,#00f2fe);
      transition: 0.3s;
    }

    .question {
      font-size: 18px;
      margin: 15px 0;
    }

    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: #f1f3f5;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #4facfe;
      color: white;
    }

    .hidden { display: none; }

    /* 🔥 IMAGE PARFAITE */
    .result img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 12px;
      margin-top: 10px;
      display: block;
    }

    .cta {
      margin-top: 15px;
      padding: 14px;
      border-radius: 14px;
      background: linear-gradient(90deg,#4facfe,#00f2fe);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

  </style>
</head>
<body>

<div class="app">

  <h2>DreamTrip ✈️</h2>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="quiz">
    <div class="question" id="question"></div>
    <div id="answers"></div>
  </div>

  <div id="result" class="hidden">
    <h3>🌍 Ton voyage idéal</h3>
    <div id="destinations"></div>
    <img id="image">
    <div class="cta">Réserver ce voyage ✈️</div>
  </div>

</div>

<script>
const questions = [
  { text: "Quel type de lieu préfères-tu ?", options: ["Plage","Montagne","Ville"] },
  { text: "Quel climat ?", options: ["Chaud","Tempéré","Froid"] },
  { text: "Quel style de voyage ?", options: ["Détente","Aventure","Culture"] },
  { text: "Ton budget ?", options: ["Petit","Moyen","Élevé"] },
  { text: "Durée du voyage ?", options: ["Week-end","1 semaine","2+ semaines"] }
];

let step = 0;
let answers = [];

function showQuestion() {
  const q = questions[step];
  document.getElementById('question').innerText = q.text;

  const answersDiv = document.getElementById('answers');
  answersDiv.innerHTML = "";

  q.options.forEach(option => {
    const btn = document.createElement('button');
    btn.innerText = option;
    btn.onclick = () => selectAnswer(option);
    answersDiv.appendChild(btn);
  });

  updateProgress();
}

function selectAnswer(option) {
  answers.push(option);
  step++;

  if (step < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function updateProgress() {
  const percent = (step / questions.length) * 100;
  document.getElementById('progressBar').style.width = percent + "%";
}

function showResult() {
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');

  let result = "";
  let img = "";

  if (answers.includes("Plage") && answers.includes("Chaud")) {
    result = "Bali 🇮🇩, Maldives 🇲🇻, Thaïlande 🇹🇭, Mexique 🇲🇽";
    img = "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80";
  } else if (answers.includes("Montagne")) {
    result = "Suisse 🇨🇭, Canada 🇨🇦, Autriche 🇦🇹, Népal 🇳🇵";
    img = "https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=800&q=80";
  } else {
    result = "New York 🇺🇸, Tokyo 🇯🇵, Paris 🇫🇷, Dubaï 🇦🇪";
    img = "https://images.unsplash.com/photo-1491553895911-0055eca6402d?auto=format&fit=crop&w=800&q=80";
  }

  document.getElementById('destinations').innerText = result;

  const image = document.getElementById('image');
  image.src = img;

  image.onerror = () => {
    image.src = "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80";
  };
}

showQuestion();
</script>

</body>
</html>
